<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c5a3"/>
      <stop offset="100%" style="stop-color:#e8a87c"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9f4"/>
      <stop offset="100%" style="stop-color:#e8f5e9"/>
    </linearGradient>
    <linearGradient id="scrubs" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b2dfdb"/>
      <stop offset="100%" style="stop-color:#80cbc4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg2)"/>

  <!-- Far background wall -->
  <rect x="0" y="300" width="800" height="500" fill="#e0f2f1" opacity="0.5"/>
  <rect x="0" y="600" width="800" height="200" fill="#f1f8f6"/>

  <!-- Elderly woman (right) -->
  <ellipse cx="520" cy="260" rx="60" ry="70" fill="url(#skin)"/> <!-- head -->
  <rect x="430" y="320" width="180" height="280" rx="20" fill="#ffe0b2"/> <!-- body/top -->
  <rect x="430" y="550" width="180" height="200" rx="0" fill="#d7ccc8"/> <!-- bottom/pants -->
  <!-- Hair -->
  <ellipse cx="520" cy="210" rx="62" ry="40" fill="#bdbdbd"/>
  <!-- Face -->
  <ellipse cx="505" cy="250" rx="5" ry="6" fill="#5d4037"/>
  <ellipse cx="535" cy="250" rx="5" ry="6" fill="#5d4037"/>
  <path d="M 505 272 Q 520 285 535 272" stroke="#5d4037" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Smile lines -->
  <path d="M 495 262 Q 490 268 496 272" stroke="#c68642" stroke-width="1.5" fill="none"/>
  <path d="M 545 262 Q 550 268 544 272" stroke="#c68642" stroke-width="1.5" fill="none"/>

  <!-- Caregiver (left) -->
  <ellipse cx="280" cy="270" rx="55" ry="65" fill="#d4956a"/> <!-- head - darker skin -->
  <rect x="200" y="325" width="160" height="300" rx="16" fill="url(#scrubs)"/> <!-- scrubs top -->
  <rect x="200" y="590" width="160" height="210" rx="0" fill="#4db6ac"/> <!-- scrubs bottom -->
  <!-- Hair up/back -->
  <path d="M 230 240 Q 280 190 330 240 L 330 270 Q 280 260 230 270 Z" fill="#3e2723"/>
  <!-- Face -->
  <ellipse cx="265" cy="260" rx="5" ry="6" fill="#3e2723"/>
  <ellipse cx="295" cy="260" rx="5" ry="6" fill="#3e2723"/>
  <path d="M 263 278 Q 280 292 297 278" stroke="#3e2723" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Caregiver arm reaching toward patient -->
  <path d="M 360 420 Q 420 380 490 360" stroke="#80cbc4" stroke-width="40" fill="none" stroke-linecap="round"/>
  <ellipse cx="490" cy="358" rx="22" ry="22" fill="#d4956a"/>

  <!-- Patient arm -->
  <path d="M 520 420 Q 490 440 460 430" stroke="#ffe0b2" stroke-width="36" fill="none" stroke-linecap="round"/>

  <!-- Window light effect -->
  <rect x="580" y="0" width="220" height="380" fill="white" opacity="0.15" rx="8"/>

  <!-- Green badge (peace of mind) -->
  <rect x="30" y="620" width="200" height="60" rx="16" fill="#00D166"/>
  <circle cx="62" cy="650" r="18" fill="rgba(255,255,255,0.25)"/>
  <text x="55" y="656" font-family="serif" font-size="18" fill="white">❤</text>
  <text x="88" y="645" font-family="Arial" font-size="13" font-weight="bold" fill="white">Peace of Mind</text>
  <text x="88" y="663" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.8)">Guaranteed 24/7</text>
</svg>
